<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ねこカフェ for Engineers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">🐱 ねこカフェ for Engineers</h1>
      <p class="subtitle">猫の手も借りたいあなたに、ひとときの癒しを</p>
    </header>

    <main class="main">
      <!-- 猫エリア -->
      <section class="cat-area" id="catArea">
        <div class="cat" id="cat" title="クリックして撫でる">
          <div class="cat-ear cat-ear-left"></div>
          <div class="cat-ear cat-ear-right"></div>
          <div class="cat-head">
            <div class="cat-eye cat-eye-left"><div class="cat-pupil"></div></div>
            <div class="cat-eye cat-eye-right"><div class="cat-pupil"></div></div>
            <div class="cat-nose"></div>
            <div class="cat-mouth"></div>
            <div class="cat-whisker cat-whisker-left-top"></div>
            <div class="cat-whisker cat-whisker-left-bottom"></div>
            <div class="cat-whisker cat-whisker-right-top"></div>
            <div class="cat-whisker cat-whisker-right-bottom"></div>
          </div>
          <div class="cat-body"></div>
          <div class="cat-tail"></div>
          <div class="cat-paw cat-paw-left"></div>
          <div class="cat-paw cat-paw-right"></div>
        </div>
        <div class="cat-message" id="catMessage"></div>
        <div class="pet-effect" id="petEffect">♥</div>
      </section>

      <!-- ポモドーロタイマー -->
      <section class="pomodoro-section">
        <h2 class="section-title">ポモドーロタイマー</h2>
        <div class="pomodoro">
          <div class="timer-display" id="timerDisplay">25:00</div>
          <div class="timer-label" id="timerLabel">作業時間</div>
          <div class="timer-progress">
            <div class="timer-progress-bar" id="timerProgressBar"></div>
          </div>
          <div class="timer-controls">
            <button class="btn btn-start" id="btnStart">スタート</button>
            <button class="btn btn-pause" id="btnPause" disabled>一時停止</button>
            <button class="btn btn-reset" id="btnReset">リセット</button>
          </div>
          <div class="timer-settings">
            <label>作業 <input type="number" id="workMinutes" value="25" min="1" max="60">分</label>
            <label>休憩 <input type="number" id="breakMinutes" value="5" min="1" max="30">分</label>
          </div>
        </div>
      </section>

      <!-- 環境音ミキサー -->
      <section class="sound-section">
        <h2 class="section-title">環境音ミキサー</h2>
        <div class="audio-status" id="audioStatus">タップして音を有効化</div>
        <div class="master-volume">
          <span class="master-label">🔊 マスターボリューム</span>
          <input type="range" class="sound-slider master-slider" id="masterVolume" min="0" max="100" value="50">
          <span class="sound-value" id="masterValue">50%</span>
        </div>
        <div class="sound-mixer">
          <!-- 雨音 -->
          <div class="sound-channel">
            <span class="sound-icon">🌧️</span>
            <span class="sound-name">雨音</span>
            <input type="range" class="sound-slider" id="rainVolume" min="0" max="100" value="0">
            <span class="sound-value" id="rainValue">0%</span>
            <button class="btn-shuffle" id="rainShuffle" title="ランダム切替">🔀</button>
            <span class="now-playing" id="rainNowPlaying"></span>
          </div>
          <!-- 焚き火 -->
          <div class="sound-channel">
            <span class="sound-icon">🔥</span>
            <span class="sound-name">焚き火</span>
            <input type="range" class="sound-slider" id="fireVolume" min="0" max="100" value="0">
            <span class="sound-value" id="fireValue">0%</span>
            <span class="now-playing" id="fireNowPlaying"></span>
          </div>
          <!-- 自然 -->
          <div class="sound-channel">
            <span class="sound-icon">🌿</span>
            <span class="sound-name">自然</span>
            <input type="range" class="sound-slider" id="natureVolume" min="0" max="100" value="0">
            <span class="sound-value" id="natureValue">0%</span>
            <button class="btn-shuffle" id="natureShuffle" title="ランダム切替">🔀</button>
            <span class="now-playing" id="natureNowPlaying"></span>
          </div>
          <!-- 波の音 -->
          <div class="sound-channel">
            <span class="sound-icon">🌊</span>
            <span class="sound-name">波の音</span>
            <input type="range" class="sound-slider" id="waveVolume" min="0" max="100" value="0">
            <span class="sound-value" id="waveValue">0%</span>
            <span class="now-playing" id="waveNowPlaying"></span>
          </div>
          <!-- カフェ -->
          <div class="sound-channel">
            <span class="sound-icon">☕</span>
            <span class="sound-name">カフェ</span>
            <input type="range" class="sound-slider" id="cafeVolume" min="0" max="100" value="0">
            <span class="sound-value" id="cafeValue">0%</span>
            <button class="btn-shuffle" id="cafeShuffle" title="ランダム切替">🔀</button>
            <span class="now-playing" id="cafeNowPlaying"></span>
          </div>
          <!-- オフィス -->
          <div class="sound-channel">
            <span class="sound-icon">💻</span>
            <span class="sound-name">オフィス</span>
            <input type="range" class="sound-slider" id="workVolume" min="0" max="100" value="0">
            <span class="sound-value" id="workValue">0%</span>
            <button class="btn-shuffle" id="workShuffle" title="ランダム切替">🔀</button>
            <span class="now-playing" id="workNowPlaying"></span>
          </div>
        </div>
        <div class="preset-section">
          <span class="preset-label">おすすめミックス:</span>
          <div class="preset-buttons">
            <button class="btn btn-preset" data-preset="deepWork">集中モード</button>
            <button class="btn btn-preset" data-preset="relax">リラックス</button>
            <button class="btn btn-preset" data-preset="beach">ビーチ</button>
            <button class="btn btn-preset" data-preset="cafeTime">カフェ作業</button>
          </div>
        </div>
      </section>

      <!-- 名言 -->
      <section class="quote-section">
        <h2 class="section-title">今日の癒しの言葉</h2>
        <div class="quote-card" id="quoteCard">
          <p class="quote-text" id="quoteText"></p>
          <p class="quote-author" id="quoteAuthor"></p>
        </div>
        <button class="btn btn-quote" id="btnNewQuote">次の言葉</button>
      </section>
    </main>

    <footer class="footer">
      <p>お疲れさまです。あなたの頑張りを猫たちは知っています。</p>
      <p class="footer-credit">環境音素材: <a href="https://moodist.mvze.net/" target="_blank" rel="noopener">Moodist</a> (Pixabay License / CC0)</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
