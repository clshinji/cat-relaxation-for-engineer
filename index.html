<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ねこカフェ for Engineers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">🐱 ねこカフェ for Engineers</h1>
      <p class="subtitle">猫の手も借りたいあなたに、ひとときの癒しを</p>
    </header>

    <main class="main">
      <!-- 猫エリア -->
      <section class="cat-area" id="catArea">
        <div class="cat" id="cat" title="クリックして撫でる">
          <svg class="cat-svg" viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg">
            <!-- しっぽ（右側にカーブ） -->
            <path class="cat-tail" d="M145,175 Q168,165 175,140 Q180,120 170,110" fill="none" stroke="#3d1e1e" stroke-width="9" stroke-linecap="round"/>
            <path class="cat-tail" d="M145,175 Q168,165 175,140 Q180,120 170,110" fill="none" stroke="#9a9a9a" stroke-width="5" stroke-linecap="round"/>
            <!-- 体（座りポーズ・洋梨型blob） -->
            <g class="cat-body-group">
              <path d="M42,140 Q38,185 50,210 Q65,228 100,228 Q135,228 150,210 Q162,185 158,140 Q155,120 100,118 Q45,120 42,140 Z" fill="#9a9a9a" stroke="#3d1e1e" stroke-width="5" stroke-linejoin="round"/>
            </g>
            <!-- 左手（ちょこっと上げてる） -->
            <path d="M52,155 Q38,140 35,130" fill="none" stroke="#3d1e1e" stroke-width="9" stroke-linecap="round"/>
            <path d="M52,155 Q38,140 35,130" fill="none" stroke="#9a9a9a" stroke-width="5" stroke-linecap="round"/>
            <!-- 右手（軽く横に出す） -->
            <path d="M148,160 Q160,148 165,142" fill="none" stroke="#3d1e1e" stroke-width="9" stroke-linecap="round"/>
            <path d="M148,160 Q160,148 165,142" fill="none" stroke="#9a9a9a" stroke-width="5" stroke-linecap="round"/>
            <!-- 頭（大きくて丸い・体と重なる） -->
            <ellipse cx="100" cy="82" rx="62" ry="56" fill="#9a9a9a" stroke="#3d1e1e" stroke-width="5"/>
            <!-- 耳（左）- 三角 -->
            <g class="cat-ear-left">
              <polygon points="48,50 30,6 72,35" fill="#9a9a9a" stroke="#3d1e1e" stroke-width="5" stroke-linejoin="round"/>
              <polygon points="50,44 38,16 66,37" fill="#f5a0b0" opacity="0.7"/>
            </g>
            <!-- 耳（右）- 三角 -->
            <g class="cat-ear-right">
              <polygon points="152,50 170,6 128,35" fill="#9a9a9a" stroke="#3d1e1e" stroke-width="5" stroke-linejoin="round"/>
              <polygon points="150,44 162,16 134,37" fill="#f5a0b0" opacity="0.7"/>
            </g>
            <!-- 目（左）- シンプルな黒丸 -->
            <g class="cat-eye-group">
              <circle cx="78" cy="78" r="7" fill="#3d1e1e"/>
              <circle cx="75" cy="75" r="2.5" fill="#fff" opacity="0.8"/>
            </g>
            <!-- 目（右）- シンプルな黒丸 -->
            <g class="cat-eye-group">
              <circle cx="118" cy="78" r="7" fill="#3d1e1e"/>
              <circle cx="115" cy="75" r="2.5" fill="#fff" opacity="0.8"/>
            </g>
            <!-- まぶた（まばたき用） -->
            <ellipse class="cat-eyelid cat-eyelid-left" cx="78" cy="78" rx="9" ry="9" fill="#9a9a9a"/>
            <ellipse class="cat-eyelid cat-eyelid-right" cx="118" cy="78" rx="9" ry="9" fill="#9a9a9a"/>
            <!-- 鼻 (小さな逆三角) -->
            <ellipse cx="98" cy="92" rx="3" ry="2" fill="#3d1e1e"/>
            <!-- 口（にっこり開いた口） -->
            <path d="M88,97 Q93,104 98,97 Q103,104 108,97" fill="none" stroke="#3d1e1e" stroke-width="2" stroke-linecap="round"/>
            <!-- 舌（ちょこっとピンク） -->
            <ellipse cx="98" cy="102" rx="4" ry="3" fill="#f5a0b0"/>
            <!-- ひげ（左）- 太めのダーク線 -->
            <line x1="26" y1="82" x2="62" y2="88" stroke="#3d1e1e" stroke-width="2" stroke-linecap="round"/>
            <line x1="24" y1="92" x2="61" y2="93" stroke="#3d1e1e" stroke-width="2" stroke-linecap="round"/>
            <line x1="28" y1="102" x2="63" y2="99" stroke="#3d1e1e" stroke-width="2" stroke-linecap="round"/>
            <!-- ひげ（右）- 太めのダーク線 -->
            <line x1="174" y1="82" x2="134" y2="88" stroke="#3d1e1e" stroke-width="2" stroke-linecap="round"/>
            <line x1="176" y1="92" x2="135" y2="93" stroke="#3d1e1e" stroke-width="2" stroke-linecap="round"/>
            <line x1="172" y1="102" x2="133" y2="99" stroke="#3d1e1e" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="cat-message" id="catMessage"></div>
        <div class="pet-effect" id="petEffect">♥</div>
      </section>

      <!-- ポモドーロタイマー -->
      <section class="pomodoro-section">
        <h2 class="section-title">ポモドーロタイマー</h2>
        <div class="pomodoro">
          <div class="timer-display" id="timerDisplay">25:00</div>
          <div class="timer-label" id="timerLabel">作業時間</div>
          <div class="timer-progress">
            <div class="timer-progress-bar" id="timerProgressBar"></div>
          </div>
          <div class="timer-controls">
            <button class="btn btn-start" id="btnStart">スタート</button>
            <button class="btn btn-pause" id="btnPause" disabled>一時停止</button>
            <button class="btn btn-reset" id="btnReset">リセット</button>
          </div>
          <div class="timer-settings">
            <label>作業 <input type="number" id="workMinutes" value="25" min="1" max="60">分</label>
            <label>休憩 <input type="number" id="breakMinutes" value="5" min="1" max="30">分</label>
          </div>
        </div>
      </section>

      <!-- BGM -->
      <section class="sound-section">
        <h2 class="section-title">BGM</h2>
        <div class="audio-status" id="audioStatus">タップして音を有効化</div>
        <div class="bgm-display">
          <div class="bgm-current" id="bgmCurrent">
            <span class="bgm-icon" id="bgmIcon"></span>
            <span class="bgm-label" id="bgmLabel"></span>
          </div>
          <div class="bgm-mode" id="bgmMode">作業モード</div>
        </div>
        <button class="btn btn-settings" id="btnSettings">BGM設定</button>
      </section>

      <!-- BGM設定モーダル -->
      <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
          <h2 class="settings-title">BGM設定</h2>
          <div class="settings-group">
            <h3 class="settings-group-title">作業時間のBGM</h3>
            <div class="sound-options" id="workSoundOptions"></div>
          </div>
          <div class="settings-group">
            <h3 class="settings-group-title">休憩時間のBGM</h3>
            <div class="sound-options" id="breakSoundOptions"></div>
          </div>
          <div class="settings-group">
            <h3 class="settings-group-title">癒しの言葉の切り替え間隔</h3>
            <div class="quote-interval-setting">
              <label><input type="number" id="quoteIntervalMinutes" value="1" min="1" max="60">分ごと</label>
            </div>
          </div>
          <button class="btn btn-close-settings" id="btnCloseSettings">閉じる</button>
        </div>
      </div>

      <!-- 名言 -->
      <section class="quote-section">
        <h2 class="section-title">今日の癒しの言葉</h2>
        <div class="quote-card" id="quoteCard">
          <p class="quote-text" id="quoteText"></p>
          <p class="quote-author" id="quoteAuthor"></p>
        </div>
        <div class="quote-timer-info">
          <span class="quote-timer-label" id="quoteTimerLabel"></span>
        </div>
        <button class="btn btn-quote" id="btnNewQuote">次の言葉</button>
      </section>
    </main>

    <footer class="footer">
      <p>お疲れさまです。あなたの頑張りを猫たちは知っています。</p>
      <p class="footer-credit">環境音素材: <a href="https://moodist.mvze.net/" target="_blank" rel="noopener">Moodist</a> (Pixabay License / CC0)</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
