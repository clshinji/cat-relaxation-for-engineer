<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ねこカフェ for Engineers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">🐱 ねこカフェ for Engineers</h1>
      <p class="subtitle">猫の手も借りたいあなたに、ひとときの癒しを</p>
    </header>

    <main class="main">
      <!-- 猫エリア -->
      <section class="cat-area" id="catArea">
        <div class="cat" id="cat" title="クリックして撫でる">
          <svg class="cat-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- しっぽ -->
            <path class="cat-tail" d="M160,155 Q185,140 190,115 Q193,100 185,95" fill="none" stroke="#f5b342" stroke-width="10" stroke-linecap="round"/>
            <!-- しっぽの縞模様 -->
            <path class="cat-tail" d="M170,145 Q182,137 186,125" fill="none" stroke="#e09a28" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
            <path class="cat-tail" d="M178,133 Q184,125 186,115" fill="none" stroke="#e09a28" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
            <!-- 体 -->
            <g class="cat-body-group">
              <ellipse cx="100" cy="155" rx="52" ry="38" fill="#f5b342"/>
              <!-- 体の縞模様（タビー柄） -->
              <path d="M78,140 Q100,136 122,140" fill="none" stroke="#e09a28" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
              <path d="M75,149 Q100,145 125,149" fill="none" stroke="#e09a28" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
              <path d="M78,158 Q100,154 122,158" fill="none" stroke="#e09a28" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
              <!-- 胸の白い毛 -->
              <ellipse cx="100" cy="148" rx="26" ry="22" fill="#ffe8b8" opacity="0.6"/>
            </g>
            <!-- 前足（左） -->
            <ellipse cx="70" cy="180" rx="14" ry="10" fill="#f5b342"/>
            <ellipse cx="70" cy="182" rx="8" ry="5" fill="#ffe0a0"/>
            <!-- 前足（右） -->
            <ellipse cx="130" cy="180" rx="14" ry="10" fill="#f5b342"/>
            <ellipse cx="130" cy="182" rx="8" ry="5" fill="#ffe0a0"/>
            <!-- 肉球（左） -->
            <ellipse cx="70" cy="184" rx="5" ry="3.5" fill="#ff9eaa" opacity="0.7"/>
            <circle cx="66" cy="181" r="2" fill="#ff9eaa" opacity="0.6"/>
            <circle cx="74" cy="181" r="2" fill="#ff9eaa" opacity="0.6"/>
            <!-- 肉球（右） -->
            <ellipse cx="130" cy="184" rx="5" ry="3.5" fill="#ff9eaa" opacity="0.7"/>
            <circle cx="126" cy="181" r="2" fill="#ff9eaa" opacity="0.6"/>
            <circle cx="134" cy="181" r="2" fill="#ff9eaa" opacity="0.6"/>
            <!-- 頭（大きめ＝かわいい比率） -->
            <ellipse cx="100" cy="90" rx="58" ry="52" fill="#f5b342"/>
            <!-- おでこの縞模様 -->
            <path d="M88,58 L85,48" fill="none" stroke="#e09a28" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
            <path d="M100,56 L100,45" fill="none" stroke="#e09a28" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
            <path d="M112,58 L115,48" fill="none" stroke="#e09a28" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
            <!-- 耳（左） -->
            <g class="cat-ear-left">
              <polygon points="52,55 38,18 70,42" fill="#f5b342"/>
              <polygon points="54,50 44,26 66,44" fill="#ff9eaa" opacity="0.5"/>
            </g>
            <!-- 耳（右） -->
            <g class="cat-ear-right">
              <polygon points="148,55 162,18 130,42" fill="#f5b342"/>
              <polygon points="146,50 156,26 134,44" fill="#ff9eaa" opacity="0.5"/>
            </g>
            <!-- ほっぺ（チーク） -->
            <ellipse cx="62" cy="100" rx="12" ry="7" fill="#ff9eaa" opacity="0.35"/>
            <ellipse cx="138" cy="100" rx="12" ry="7" fill="#ff9eaa" opacity="0.35"/>
            <!-- 目（左）- 大きくてキラキラ -->
            <g class="cat-eye-group">
              <ellipse cx="78" cy="82" rx="13" ry="14" fill="#fff"/>
              <ellipse class="cat-pupil" cx="80" cy="84" rx="9" ry="10" fill="#3a3a3a"/>
              <ellipse cx="80" cy="84" rx="9" ry="10" fill="url(#eyeGradient)"/>
              <circle cx="76" cy="79" r="4" fill="#fff" opacity="0.9"/>
              <circle cx="83" cy="87" r="2" fill="#fff" opacity="0.6"/>
            </g>
            <!-- 目（右）- 大きくてキラキラ -->
            <g class="cat-eye-group">
              <ellipse cx="122" cy="82" rx="13" ry="14" fill="#fff"/>
              <ellipse class="cat-pupil" cx="120" cy="84" rx="9" ry="10" fill="#3a3a3a"/>
              <ellipse cx="120" cy="84" rx="9" ry="10" fill="url(#eyeGradient)"/>
              <circle cx="116" cy="79" r="4" fill="#fff" opacity="0.9"/>
              <circle cx="123" cy="87" r="2" fill="#fff" opacity="0.6"/>
            </g>
            <!-- まぶた（まばたき用） -->
            <ellipse class="cat-eyelid cat-eyelid-left" cx="78" cy="82" rx="14" ry="15" fill="#f5b342"/>
            <ellipse class="cat-eyelid cat-eyelid-right" cx="122" cy="82" rx="14" ry="15" fill="#f5b342"/>
            <!-- にっこり目（撫でた時用 - 通常は非表示） -->
            <g class="cat-happy-eyes">
              <path d="M68,82 Q78,72 88,82" fill="none" stroke="#3a3a3a" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M112,82 Q122,72 132,82" fill="none" stroke="#3a3a3a" stroke-width="2.5" stroke-linecap="round"/>
            </g>
            <!-- 鼻 -->
            <path d="M97,96 L100,100 L103,96 Z" fill="#ff8a9e"/>
            <!-- 口（ω型） -->
            <path class="cat-mouth" d="M92,103 Q96,108 100,103 Q104,108 108,103" fill="none" stroke="#e09a28" stroke-width="1.5" stroke-linecap="round"/>
            <!-- にっこり口（撫でた時用 - 通常は非表示） -->
            <path class="cat-happy-mouth" d="M88,103 Q94,112 100,106 Q106,112 112,103" fill="none" stroke="#e09a28" stroke-width="1.5" stroke-linecap="round"/>
            <!-- ひげ（左） -->
            <line x1="30" y1="90" x2="65" y2="95" stroke="#e09a28" stroke-width="1" opacity="0.5"/>
            <line x1="28" y1="98" x2="64" y2="100" stroke="#e09a28" stroke-width="1" opacity="0.5"/>
            <line x1="32" y1="106" x2="66" y2="104" stroke="#e09a28" stroke-width="1" opacity="0.5"/>
            <!-- ひげ（右） -->
            <line x1="170" y1="90" x2="135" y2="95" stroke="#e09a28" stroke-width="1" opacity="0.5"/>
            <line x1="172" y1="98" x2="136" y2="100" stroke="#e09a28" stroke-width="1" opacity="0.5"/>
            <line x1="168" y1="106" x2="134" y2="104" stroke="#e09a28" stroke-width="1" opacity="0.5"/>
            <!-- グラデーション定義 -->
            <defs>
              <radialGradient id="eyeGradient" cx="45%" cy="40%">
                <stop offset="0%" stop-color="#555" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#222" stop-opacity="0.8"/>
              </radialGradient>
            </defs>
          </svg>
        </div>
        <div class="cat-message" id="catMessage"></div>
        <div class="pet-effect" id="petEffect">♥</div>
      </section>

      <!-- ポモドーロタイマー -->
      <section class="pomodoro-section">
        <h2 class="section-title">ポモドーロタイマー</h2>
        <div class="pomodoro">
          <div class="timer-display" id="timerDisplay">25:00</div>
          <div class="timer-label" id="timerLabel">作業時間</div>
          <div class="timer-progress">
            <div class="timer-progress-bar" id="timerProgressBar"></div>
          </div>
          <div class="timer-controls">
            <button class="btn btn-start" id="btnStart">スタート</button>
            <button class="btn btn-pause" id="btnPause" disabled>一時停止</button>
            <button class="btn btn-reset" id="btnReset">リセット</button>
          </div>
          <div class="timer-settings">
            <label>作業 <input type="number" id="workMinutes" value="25" min="1" max="60">分</label>
            <label>休憩 <input type="number" id="breakMinutes" value="5" min="1" max="30">分</label>
          </div>
        </div>
      </section>

      <!-- BGM -->
      <section class="sound-section">
        <h2 class="section-title">BGM</h2>
        <div class="audio-status" id="audioStatus">タップして音を有効化</div>
        <div class="bgm-display">
          <div class="bgm-current" id="bgmCurrent">
            <span class="bgm-icon" id="bgmIcon"></span>
            <span class="bgm-label" id="bgmLabel"></span>
          </div>
          <div class="bgm-mode" id="bgmMode">作業モード</div>
        </div>
        <button class="btn btn-settings" id="btnSettings">BGM設定</button>
      </section>

      <!-- BGM設定モーダル -->
      <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
          <h2 class="settings-title">BGM設定</h2>
          <div class="settings-group">
            <h3 class="settings-group-title">作業時間のBGM</h3>
            <div class="sound-options" id="workSoundOptions"></div>
          </div>
          <div class="settings-group">
            <h3 class="settings-group-title">休憩時間のBGM</h3>
            <div class="sound-options" id="breakSoundOptions"></div>
          </div>
          <div class="settings-group">
            <h3 class="settings-group-title">癒しの言葉の切り替え間隔</h3>
            <div class="quote-interval-setting">
              <label><input type="number" id="quoteIntervalMinutes" value="1" min="1" max="60">分ごと</label>
            </div>
          </div>
          <button class="btn btn-close-settings" id="btnCloseSettings">閉じる</button>
        </div>
      </div>

      <!-- 名言 -->
      <section class="quote-section">
        <h2 class="section-title">今日の癒しの言葉</h2>
        <div class="quote-card" id="quoteCard">
          <p class="quote-text" id="quoteText"></p>
          <p class="quote-author" id="quoteAuthor"></p>
        </div>
        <div class="quote-timer-info">
          <span class="quote-timer-label" id="quoteTimerLabel"></span>
        </div>
        <button class="btn btn-quote" id="btnNewQuote">次の言葉</button>
      </section>
    </main>

    <footer class="footer">
      <p>お疲れさまです。あなたの頑張りを猫たちは知っています。</p>
      <p class="footer-credit">環境音素材: <a href="https://moodist.mvze.net/" target="_blank" rel="noopener">Moodist</a> (Pixabay License / CC0)</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
