<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ねこカフェ for Engineers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">🐱 ねこカフェ for Engineers</h1>
      <p class="subtitle">猫の手も借りたいあなたに、ひとときの癒しを</p>
    </header>

    <main class="main">
      <!-- 猫エリア -->
      <section class="cat-area" id="catArea">
        <div class="cat" id="cat" title="クリックして撫でる">
          <svg class="cat-svg" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
            <!-- しっぽ（右側にカーブ） -->
            <path class="cat-tail" d="M148,170 Q175,160 180,135 Q183,118 172,112" fill="none" stroke="#3d1e1e" stroke-width="8" stroke-linecap="round"/>
            <path class="cat-tail" d="M148,170 Q175,160 180,135 Q183,118 172,112" fill="none" stroke="#9e9e9e" stroke-width="5" stroke-linecap="round"/>
            <!-- 体（丸っこいblob型） -->
            <g class="cat-body-group">
              <ellipse cx="100" cy="155" rx="58" ry="52" fill="#9e9e9e" stroke="#3d1e1e" stroke-width="4"/>
            </g>
            <!-- 前足（左）- 短くて丸い -->
            <ellipse cx="72" cy="195" rx="16" ry="12" fill="#9e9e9e" stroke="#3d1e1e" stroke-width="3.5"/>
            <!-- 前足（右）- 短くて丸い -->
            <ellipse cx="128" cy="195" rx="16" ry="12" fill="#9e9e9e" stroke="#3d1e1e" stroke-width="3.5"/>
            <!-- 頭（大きくて丸い） -->
            <ellipse cx="100" cy="85" rx="62" ry="56" fill="#9e9e9e" stroke="#3d1e1e" stroke-width="4"/>
            <!-- 耳（左）- 三角 -->
            <g class="cat-ear-left">
              <polygon points="50,52 32,10 72,38" fill="#9e9e9e" stroke="#3d1e1e" stroke-width="4" stroke-linejoin="round"/>
              <polygon points="52,46 40,18 66,38" fill="#f5a0b0" opacity="0.7"/>
            </g>
            <!-- 耳（右）- 三角 -->
            <g class="cat-ear-right">
              <polygon points="150,52 168,10 128,38" fill="#9e9e9e" stroke="#3d1e1e" stroke-width="4" stroke-linejoin="round"/>
              <polygon points="148,46 160,18 134,38" fill="#f5a0b0" opacity="0.7"/>
            </g>
            <!-- 目（左）- シンプルな黒丸 -->
            <g class="cat-eye-group">
              <circle cx="78" cy="82" r="6" fill="#3d1e1e"/>
              <circle cx="76" cy="80" r="2" fill="#fff" opacity="0.7"/>
            </g>
            <!-- 目（右）- シンプルな黒丸 -->
            <g class="cat-eye-group">
              <circle cx="122" cy="82" r="6" fill="#3d1e1e"/>
              <circle cx="120" cy="80" r="2" fill="#fff" opacity="0.7"/>
            </g>
            <!-- まぶた（まばたき用） -->
            <ellipse class="cat-eyelid cat-eyelid-left" cx="78" cy="82" rx="8" ry="8" fill="#9e9e9e"/>
            <ellipse class="cat-eyelid cat-eyelid-right" cx="122" cy="82" rx="8" ry="8" fill="#9e9e9e"/>
            <!-- 鼻 -->
            <path d="M97,96 L100,100 L103,96 Z" fill="#3d1e1e"/>
            <!-- 口（ω型・にっこり） -->
            <path d="M92,103 Q96,109 100,103 Q104,109 108,103" fill="none" stroke="#3d1e1e" stroke-width="2" stroke-linecap="round"/>
            <!-- 舌（ちょこっとピンク） -->
            <ellipse cx="100" cy="108" rx="4" ry="3" fill="#f5a0b0"/>
            <!-- ひげ（左）- 太めのダーク線 -->
            <line x1="28" y1="88" x2="62" y2="94" stroke="#3d1e1e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="26" y1="97" x2="61" y2="99" stroke="#3d1e1e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="30" y1="106" x2="63" y2="104" stroke="#3d1e1e" stroke-width="1.5" stroke-linecap="round"/>
            <!-- ひげ（右）- 太めのダーク線 -->
            <line x1="172" y1="88" x2="138" y2="94" stroke="#3d1e1e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="174" y1="97" x2="139" y2="99" stroke="#3d1e1e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="170" y1="106" x2="137" y2="104" stroke="#3d1e1e" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="cat-message" id="catMessage"></div>
        <div class="pet-effect" id="petEffect">♥</div>
      </section>

      <!-- ポモドーロタイマー -->
      <section class="pomodoro-section">
        <h2 class="section-title">ポモドーロタイマー</h2>
        <div class="pomodoro">
          <div class="timer-display" id="timerDisplay">25:00</div>
          <div class="timer-label" id="timerLabel">作業時間</div>
          <div class="timer-progress">
            <div class="timer-progress-bar" id="timerProgressBar"></div>
          </div>
          <div class="timer-controls">
            <button class="btn btn-start" id="btnStart">スタート</button>
            <button class="btn btn-pause" id="btnPause" disabled>一時停止</button>
            <button class="btn btn-reset" id="btnReset">リセット</button>
          </div>
          <div class="timer-settings">
            <label>作業 <input type="number" id="workMinutes" value="25" min="1" max="60">分</label>
            <label>休憩 <input type="number" id="breakMinutes" value="5" min="1" max="30">分</label>
          </div>
        </div>
      </section>

      <!-- BGM -->
      <section class="sound-section">
        <h2 class="section-title">BGM</h2>
        <div class="audio-status" id="audioStatus">タップして音を有効化</div>
        <div class="bgm-display">
          <div class="bgm-current" id="bgmCurrent">
            <span class="bgm-icon" id="bgmIcon"></span>
            <span class="bgm-label" id="bgmLabel"></span>
          </div>
          <div class="bgm-mode" id="bgmMode">作業モード</div>
        </div>
        <button class="btn btn-settings" id="btnSettings">BGM設定</button>
      </section>

      <!-- BGM設定モーダル -->
      <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
          <h2 class="settings-title">BGM設定</h2>
          <div class="settings-group">
            <h3 class="settings-group-title">作業時間のBGM</h3>
            <div class="sound-options" id="workSoundOptions"></div>
          </div>
          <div class="settings-group">
            <h3 class="settings-group-title">休憩時間のBGM</h3>
            <div class="sound-options" id="breakSoundOptions"></div>
          </div>
          <div class="settings-group">
            <h3 class="settings-group-title">癒しの言葉の切り替え間隔</h3>
            <div class="quote-interval-setting">
              <label><input type="number" id="quoteIntervalMinutes" value="1" min="1" max="60">分ごと</label>
            </div>
          </div>
          <button class="btn btn-close-settings" id="btnCloseSettings">閉じる</button>
        </div>
      </div>

      <!-- 名言 -->
      <section class="quote-section">
        <h2 class="section-title">今日の癒しの言葉</h2>
        <div class="quote-card" id="quoteCard">
          <p class="quote-text" id="quoteText"></p>
          <p class="quote-author" id="quoteAuthor"></p>
        </div>
        <div class="quote-timer-info">
          <span class="quote-timer-label" id="quoteTimerLabel"></span>
        </div>
        <button class="btn btn-quote" id="btnNewQuote">次の言葉</button>
      </section>
    </main>

    <footer class="footer">
      <p>お疲れさまです。あなたの頑張りを猫たちは知っています。</p>
      <p class="footer-credit">環境音素材: <a href="https://moodist.mvze.net/" target="_blank" rel="noopener">Moodist</a> (Pixabay License / CC0)</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
